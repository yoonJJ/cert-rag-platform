services:
  postgres:
    image: pgvector/pgvector:pg16
    platform: linux/arm64
    environment:
      POSTGRES_DB: certdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    platform: linux/arm64
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
